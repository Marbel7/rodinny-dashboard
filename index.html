<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test přihlášení</title>
<style>
body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#1a1a2e}
.card{background:white;padding:2rem;border-radius:1rem;text-align:center;max-width:400px}
button{background:#4285f4;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:1rem}
#status{margin-top:1rem;font-size:14px;color:#666}
</style>
</head>
<body>
<div class="card">
  <h2>Test Firebase přihlášení</h2>
  <p>Pro ověření že Firebase funguje</p>
  <button id="btn">Přihlásit se přes Google</button>
  <div id="status">Čekám...</div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app=initializeApp({
  apiKey:"AIzaSyA8WFwNZ_ljLSmK7cvdWufEsY9vGsi9Ers",
  authDomain:"rodinny-dashboard-4c316.firebaseapp.com",
  projectId:"rodinny-dashboard-4c316",
  storageBucket:"rodinny-dashboard-4c316.firebasestorage.app",
  messagingSenderId:"854662524014",
  appId:"1:854662524014:web:6b960a6088878c34c4ca7f"
});

const auth=getAuth(app);
const prov=new GoogleAuthProvider();

document.getElementById('status').textContent='Firebase inicializován ✓';

document.getElementById('btn').onclick=async()=>{
  document.getElementById('status').textContent='Přihlašuji...';
  try{
    const result=await signInWithPopup(auth,prov);
    document.getElementById('status').textContent='Přihlášen: '+result.user.displayName;
  }catch(e){
    document.getElementById('status').textContent='Chyba: '+e.message;
  }
};

onAuthStateChanged(auth,u=>{
  if(u) document.getElementById('status').textContent='Přihlášen jako: '+u.displayName;
});
</script>
</body>
</html>
